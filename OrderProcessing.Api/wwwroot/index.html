<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderProcessing - Lab 4</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>📦 OrderProcessing — Lab 4</h1>
        <a href="/swagger" target="_blank" class="swagger-link">Swagger ↗</a>
    </header>

    <main class="container">
        <aside class="orders-list-panel">
            <div class="panel-header">
                <h2>Orders <span id="orders-count">· 0</span></h2>
                <button id="btn-new-order" class="btn-primary">+ Comandă nouă</button>
            </div>
            <ul id="orders-list" class="orders-list">
            </ul>
        </aside>

        <section class="order-details-panel">
            <div id="no-selection" class="empty-state">
                <p>Selectați o comandă din stânga pentru a vedea detaliile.</p>
            </div>

            <div id="order-details" class="details-content hidden">
                <div class="details-header">
                    <h2>Order Details</h2>
                    <span id="detail-id" class="text-muted"></span>
                </div>

                <div class="info-grid">
                    <div class="info-box">
                        <strong>Status</strong>
                        <span id="detail-status" class="badge"></span>
                    </div>
                    <div class="info-box">
                        <strong>Customer</strong>
                        <span id="detail-customer"></span>
                    </div>
                    <div class="info-box">
                        <strong>Items</strong>
                        <span id="detail-items"></span>
                    </div>
                    <div class="info-box">
                        <strong>Address</strong>
                        <span id="detail-address"></span>
                    </div>
                </div>

                <div class="state-diagram-container">
                    <h3>State Diagram</h3>
                    <div id="state-diagram" class="state-diagram">
                    </div>
                </div>

                <div class="actions-container">
                    <h3>Actions <span class="text-muted">(tranziții permise din starea curentă)</span></h3>
                    <div class="action-buttons">
                        <button class="btn-action" data-action="pay">Pay</button>
                        <button class="btn-action" data-action="process">Process</button>
                        <button class="btn-action" data-action="ship">Ship</button>
                        <button class="btn-action" data-action="deliver">Deliver</button>
                        <button class="btn-action btn-danger" data-action="cancel">Cancel</button>
                    </div>
                </div>

                <div class="history-container">
                    <h3>History</h3>
                    <ul id="history-list" class="history-list">
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>Creare Comandă</h2>
            <form id="new-order-form">
                <div class="form-group">
                    <label>Nume Customer</label>
                    <input type="text" id="input-name" required value="John Doe">
                </div>
                <div class="form-group">
                    <label>Vârstă</label>
                    <input type="number" id="input-age" required value="25">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="input-trusted" checked>
                    <label for="input-trusted">Este client de încredere (Trusted)</label>
                </div>
                <div class="form-group">
                    <label>Produs</label>
                    <select id="input-product">
                        <option value="11111111-1111-1111-1111-111111111111" data-price="5000" data-age="false">Laptop Gaming (5000 RON, în stoc)</option>
                        <option value="22222222-2222-2222-2222-222222222222" data-price="10" data-age="true">Bere Artizanală (10 RON, restricție vârstă 18+)</option>
                        <option value="33333333-3333-3333-3333-333333333333" data-price="2000" data-age="false">Consolă (Epuizat - va pica la validare)</option>
                        <option value="11111111-1111-1111-1111-111111111111" data-price="-50" data-age="false">Laptop cu Preț Negativ (Va pica la validare)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cantitate</label>
                    <input type="number" id="input-qty" value="1" min="1">
                </div>
                <div class="modal-actions">
                    <button type="button" id="btn-close-modal" class="btn-secondary">Anulează</button>
                    <button type="submit" class="btn-primary">Salvează</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
